<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pomssilin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- GOOGLE FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- loader -->
    <div class="loader" id="loader">
      <div class="progress-percentage" id="progress-percentage">11110%</div>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="loading-text">Ljhbdjhdbvjhdbvefjhdbvhghg jkebvejkbv</div>
    </div>

    <svg id="svg-filters">
      <defs>
        <filter
          id="water-distortion"
          x="-20%"
          y="-20%"
          width="140%"
          height="140%"
        >
          <feTurbulence
            id="turbulence"
            baseFrequency="0.015 0.01"
            numOctaves="2"
            result="noise"
          />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" />
        </filter>
      </defs>
    </svg>

    <!-- Home description -->
    <main class="hero" id="hero">
      <div class="hero__content">
        <h1 class="hero__title">hey wiwiw.</h1>
      </div>
    </main>

    <!-- navbar section -->
    <header id="home">
      <div class="switcher" id="switcher">
        <div class="switcher-root">
          <button class="switcher-btn active" data-target="home">Home</button>
          <button class="switcher-btn" data-target="resources">
            Resources
          </button>
          <button class="switcher-btn" data-target="about">About us</button>
          <button class="switcher-btn" data-target="careers">Careers</button>
          <button class="switcher-btn" data-target="tools">Tools</button>
          <button class="switcher-btn" data-target="projects">Projects</button>
          <button class="switcher-btn" data-target="contact">contact us</button>

          <div class="switcher-curr"></div>
          <div class="switcher-glow"></div>
        </div>
      </div>
    </header>

    <!-- SECTIONS -->
    <section class="about" id="about">about</section>
    <section class="services" id="services">service</section>
    <section class="projects" id="projects">projects</section>
    <section class="tools" id="tools">tools</section>
    <section class="education" id="education">education</section>
    <section class="contact" id="contact">contact</section>
    <section class="details" id="details">details</section>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script type="module" src="script.js"></script>
  </body>
</html>
